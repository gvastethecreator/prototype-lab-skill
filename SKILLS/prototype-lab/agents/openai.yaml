  default_prompt: "Create or improve a standalone browser/UI prototype, isolated multi-variant comparison lab, or prototype evidence browser using chronological folders, local runtime files, one worker per requested variant by default, explicit fallback reasons when workers are blocked, pairwise/blind/ranking review modes when useful, a compact top toolbar, a hidden right controls/provenance panel, URL-backed views/variants, scaled preview cards when indexing prototypes, and local visual QA proof."
