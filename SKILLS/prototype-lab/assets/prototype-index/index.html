<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prototype Index</title>
    <link rel="stylesheet" href="./prototype-index.css" />
  </head>
  <body>
    <main class="index-shell">
      <header class="index-topbar">
        <div>
          <p class="index-kicker">Prototype Lab</p>
          <h1>Prototype Index</h1>
        </div>
        <div class="index-actions">
          <div class="compare-controls" aria-label="Prototype comparison picker">
            <label class="compare-field">
              <span>A</span>
              <select id="compare-left" aria-label="Left prototype"></select>
            </label>
            <span class="compare-versus">vs</span>
            <label class="compare-field">
              <span>B</span>
              <select id="compare-right" aria-label="Right prototype"></select>
            </label>
            <a class="hub-open" id="compare-open" href="#">Open</a>
          </div>
          <label class="group-field">
            <span>Group</span>
            <select id="group-select" aria-label="Group prototypes by date">
              <option value="day">Day</option>
              <option value="week">Week</option>
              <option value="month">Month</option>
              <option value="year">Year</option>
            </select>
          </label>
          <label class="index-search">
            <span>Search</span>
            <input id="search-input" type="search" placeholder="title, tag, model, skill" />
          </label>
          <span class="index-count" id="result-count">0 prototypes</span>
        </div>
      </header>

      <section class="index-grid" id="prototype-grid" aria-label="Prototype cards"></section>
    </main>

    <template id="prototype-card-template">
      <article class="prototype-card">
        <a class="preview-link">
          <span class="preview-frame">
            <iframe title="" loading="lazy"></iframe>
          </span>
        </a>
        <div class="card-body">
          <div class="card-title-row">
            <div>
              <p class="index-kicker card-category"></p>
              <h2></h2>
            </div>
            <span class="status-pill"></span>
          </div>
          <p class="card-question"></p>
          <div class="card-meta" aria-label="Prototype metadata"></div>
          <div class="tag-row"></div>
          <div class="card-foot">
            <span class="card-date"></span>
            <span class="card-path"></span>
          </div>
        </div>
      </article>
    </template>

    <script defer src="./prototype-index.js"></script>
  </body>
</html>
